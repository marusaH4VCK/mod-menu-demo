name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── JOB 1: Simulator build (ไม่ต้องมี Apple certificate) ──────────────────
  build-simulator:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Prebuild (iOS)
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        working-directory: ios
        run: pod install

      - name: Build Simulator .app
        working-directory: ios
        run: |
          xcodebuild \
            -workspace modmenudemo.xcworkspace \
            -scheme modmenudemo \
            -configuration Release \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -derivedDataPath $RUNNER_TEMP/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Zip Simulator build
        run: |
          APP=$(find $RUNNER_TEMP/DerivedData -name "*.app" -type d | head -1)
          cd "$(dirname "$APP")"
          zip -r $RUNNER_TEMP/simulator-build.zip "$(basename "$APP")"

      - name: Upload Simulator build
        uses: actions/upload-artifact@v4
        with:
          name: simulator-build
          path: ${{ runner.temp }}/simulator-build.zip
          retention-days: 30

  # ── JOB 2: Signed IPA (ต้องใส่ Secrets ใน GitHub) ─────────────────────────
  build-ipa:
    runs-on: macos-latest
    timeout-minutes: 60
    # ลบ comment นี้ออกเมื่อใส่ Secrets ครบแล้ว:
    # if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Apple certificate & provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERT_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERT_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      - name: Prebuild (iOS)
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        working-directory: ios
        run: pod install

      - name: Build Archive
        working-directory: ios
        run: |
          xcodebuild \
            -workspace modmenudemo.xcworkspace \
            -scheme modmenudemo \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $RUNNER_TEMP/modmenudemo.xcarchive \
            CODE_SIGN_IDENTITY="${{ secrets.CODE_SIGN_IDENTITY }}" \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.PROVISIONING_PROFILE_NAME }}" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            archive

      - name: Export IPA
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/modmenudemo.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/ipa-output

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: mod-menu-ipa
          path: ${{ runner.temp }}/ipa-output/*.ipa
          retention-days: 30

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
